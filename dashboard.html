<!DOCTYPE html>
<html>
<head>

<title>L H Edging Admin</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
padding:20px;
}

h1{
text-align:center;
color:#00ffff;
}

.panel{
background:#ffffff22;
padding:20px;
border-radius:20px;
}

input,select,button{
width:95%;
padding:13px;
margin:8px;
border-radius:10px;
border:none;
}

button{
background:#00ffff;
font-weight:bold;
cursor:pointer;
}

.worker{
background:#0007;
padding:20px;
border-radius:15px;
margin:15px 0;
}

img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
}

.search{
background:white;
}

</style>

</head>


<body>


<h1>
🏭 L H Edging Sdn Bhd
<br>
Admin Dashboard
</h1>


<h2 id="total"></h2>


<div class="panel">


<input id="photo"
type="file"
accept="image/*">


<input id="name"
placeholder="Worker Name">


<input id="passport"
placeholder="Passport Number">


<input id="phone"
placeholder="Phone Number">


<input id="department"
placeholder="Department">


<input id="position"
placeholder="Position">


<input id="salary"
placeholder="Salary RM">


<input id="join"
type="date">


<select id="status">

<option>
Active 🟢
</option>

<option>
Inactive 🔴
</option>

</select>


<button onclick="addWorker()">
➕ Add Worker
</button>


</div>



<h2>
🔍 Search Worker
</h2>


<input
class="search"
id="search"
onkeyup="show()"
placeholder="Search Name">



<div id="list"></div>





<script>


let workers =
JSON.parse(localStorage.getItem("workers"))
|| [];


function addWorker(){


let file =
photo.files[0];


let reader =
new FileReader();



reader.onload=function(){


workers.push({

photo:reader.result,

name:name.value,

passport:passport.value,

phone:phone.value,

department:department.value,

position:position.value,

salary:salary.value,

join:join.value,

status:status.value

});


save();


}


if(file){

reader.readAsDataURL(file);

}else{

alert("Upload Photo");

}


}



function show(){


list.innerHTML="";


let find =
search.value.toLowerCase();



workers
.filter(x=>x.name.toLowerCase().includes(find))
.forEach((w,i)=>{


list.innerHTML +=`

<div class="worker">

<img src="${w.photo}">

<h2>${w.name}</h2>

🛂 Passport:
${w.passport}

<br>

📞 Phone:
${w.phone}

<br>

🏢 Department:
${w.department}

<br>

💼 Position:
${w.position}

<br>

💰 Salary:
RM ${w.salary}

<br>

📅 Join:
${w.join}

<br>

Status:
${w.status}

<br><br>


<button onclick="remove(${i})">
❌ Delete
</button>


</div>

`;

});


total.innerHTML =
"👥 Total Workers : "
+
workers.length;


}



function remove(i){

if(confirm("Delete Worker?")){

workers.splice(i,1);

save();

}

}



function save(){

localStorage.setItem(
"workers",
JSON.stringify(workers)
);

show();

}


show();


</script>


</body>
</html>
