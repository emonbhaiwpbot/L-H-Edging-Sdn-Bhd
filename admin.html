<!DOCTYPE html>
<html>

<head>

<title>Admin Login</title>

<style>

body{

background:#111;
color:white;
font-family:Arial;
text-align:center;

}

.login{

margin:100px auto;
background:#222;
padding:40px;
width:300px;
border-radius:20px;

}

input,button{

width:90%;
padding:15px;
margin:10px;
border-radius:10px;

}

button{
background:#00ffff;
}

</style>

</head>


<body>


<div class="login">


<h2>
Admin Login 🔐
</h2>


<input id="user" placeholder="Username">

<input id="pass" 
type="password"
placeholder="Password">


<button onclick="login()">
LOGIN
</button>


</div>



<script>


function login(){


let u =
document.getElementById("user").value;


let p =
document.getElementById("pass").value;



if(
u=="admin" &&
p=="12345"
){

location.href =
"dashboard.html"

}

else{

alert(
"Wrong Login"
)

}


}


</script>


</body>

</html>
